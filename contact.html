<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
<link rel="shortcut icon" href="img/t.png" type="image/x-icon">
<link rel="stylesheet" href="css/all.min.css">
<link rel="stylesheet" href="css/devicons.min.css">
<link rel="stylesheet" href="css/global.css">
<script src="js/scripts.js"></script>
<script src="js/lightning.js" defer></script>    <meta name="format-detection" content="telephone=no">
    <title>Contact | Velikhanov Teymur</title>
  </head>
  <body>
    <header class="main-header">
	<nav class="nav-container container">
		<div class="logo">
			<a href="/">
				<img class="logo-img" src="/img/t-index.png" alt="Logo">
			</a>
		</div>
		
		<button class="mobile-menu-btn" aria-label="Toggle menu">
			<span></span>
			<span></span>
		</button>

		<div class="nav-links">
			<a href="/about" data-phrase-id="nav_about">About</a>
			<a href="/skills" data-phrase-id="nav_skills">Skills</a>
			<a href="/works" data-phrase-id="nav_works">Works</a>
			<a href="/contact" data-phrase-id="nav_contact">Contact</a>
			
			<div class="theme-lang-controls">
				<button id="theme-toggle" class="control-btn" aria-label="Toggle Dark Mode">
					<i class="fa-solid fa-moon"></i>
				</button>
				
				<div class="lang-selector">
					<button data-lang="en" class="lang-btn"><img src="/img/lang/en.png" alt="EN"></button>
					<button data-lang="az" class="lang-btn"><img src="/img/lang/az.png" alt="AZ"></button>
					<button data-lang="ru" class="lang-btn"><img src="/img/lang/ru.png" alt="RU"></button>
				</div>
			</div>
		</div>
	</nav>
</header>

<canvas id="canvas"></canvas>
    <main class="container contact-page mt-4">
      <h1 class="hero-title fade-in">
        <span data-phrase-id="talk_lets">LET'S</span> <span class="text-accent" data-phrase-id="talk_accent">TALK</span>
      </h1>
      
      <p class="lead text-secondary mt-1 fade-in" data-phrase-id="contact_desc">
        Feel free to reach out for collaborations or just a friendly hello.
      </p>

      <div class="contact-grid fade-in">
        <div class="contact-info">
          <div class="contact-method">
            <span class="contact-label" data-phrase-id="details">Contact details:</span>
            <a href="mailto:teymur99@gmail.com" class="contact-value">teymur99@gmail.com</a>
            <a href="tel:+994514339847" class="contact-value">+(994) 51-433-98-47</a>
          </div>

          <div class="contact-method">
            <span class="contact-label" data-phrase-id="find_me">Find me on:</span>
            <div class="social-links-grid">
              <a href="https://github.com/velikhanov" target="_blank" class="contact-value"><i class="fab fa-github"></i> GitHub</a>
              <a href="https://www.linkedin.com/in/teymur-velikhanov-6715b420b/" target="_blank" class="contact-value"><i class="fab fa-linkedin"></i> LinkedIn</a>
            </div>
          </div>
        </div>

        <form id="contact_form" class="contact-form">
          <div class="form-group">
            <input type="text" name="name" class="form-control" placeholder="Name" data-phrase-id="name" required>
          </div>
          <div class="form-group">
            <input type="email" name="email" class="form-control" placeholder="Email" data-phrase-id="email" required>
          </div>
          <div class="form-group">
            <input type="text" name="subject" class="form-control" placeholder="Subject" data-phrase-id="subject" required>
          </div>
          <div class="form-group">
            <input type="text" name="message" class="form-control" placeholder="Message" data-phrase-id="message" required>
          </div>
          
          <button type="submit" class="btn btn-primary submit-btn">
            <span class="btn-send-text" data-phrase-id="send">Send Message</span>
          </button>
        </form>
      </div>
    </main>

    <div class="toast"></div>

    <footer>
      <p data-phrase-id="footer_text">Built by Teymur with clean code.</p>
      <div class="footer-socials">
        <a href="https://github.com/velikhanov" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
        <a href="https://www.linkedin.com/in/teymur-velikhanov-6715b420b/" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
      </div>
    </footer>

    <script src="js/languative.js" defer></script>
    <script src="lang/main.js" defer></script>
    <script src="lang/form.js" defer></script>
    <script src="js/email.min.js" defer></script>
    <script src="js/formajax.js" defer></script>
  </body>
</html>
