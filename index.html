<!DOCTYPE html>

<script src="js/languative.js"></script>
<script>
  (function() {
    const savedLang = localStorage.getItem('lang');
    if (savedLang && typeof languative !== 'undefined') {
      document.addEventListener('DOMContentLoaded', () => {
        // Small delay to ensure deferred lang/works.js etc have run
        setTimeout(() => {
          languative.changeLanguage(savedLang);
        }, 80);
      });
    }
  })();
</script>
<script src="js/lightning.js" defer></script>    <title>Velikhanov Teymur | AI & Backend Developer</title>
